apiVersion: apps/v1
kind: Deployment
metadata:
  name: todo-database
  namespace: todo
spec:
  replicas: 1
  selector:
    matchLabels:
      app: todo-database
  template:
    metadata:
      labels:
        app: todo-database
    spec:
      containers:
        - name: postgres
          image: ncore99/todo-database:latest
          ports:
            - containerPort: 5432
          envFrom:
            - secretRef:
                name: todo-db-secret
          volumeMounts:
            - name: postgres-data
              mountPath: /var/lib/postgresql/data
      volumes:
        - name: postgres-data
          persistentVolumeClaim:
            claimName: todo-db-pvc
